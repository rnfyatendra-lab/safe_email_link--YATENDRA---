<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 15px 35px rgba(0,0,0,0.2);text-align:center;animation:fadeIn 0.5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.icon-wrap{width:60px;height:60px;background:#eef0ff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.title{font-size:26px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.title span{color:#667eea}
.subtitle{font-size:14px;color:#777;margin-bottom:32px}
.field{text-align:left;margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:8px}
.field input{width:100%;padding:14px 16px;background:#f5f6ff;border:2px solid #dde1ff;border-radius:12px;color:#1a1a2e;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all 0.2s}
.field input:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 4px rgba(102,126,234,0.12)}
.error-msg{display:none;background:#fff5f5;border:2px solid #ffcccc;color:#e53e3e;padding:12px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:20px;text-align:left}
.submit-btn{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:10px}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(102,126,234,0.35)}
.submit-btn:active{transform:none}
</style>
</head>
<body>

<div class="login-card">
  <div class="icon-wrap">📩</div>
  <div class="title">Fast<span>Mailer</span></div>
  <div class="subtitle">Sign in to launch your campaigns</div>

  <div class="error-msg" id="errorBox">❌ Galat Username ya Password!</div>

  <form onsubmit="handleLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
    </div>
    
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" class="submit-btn">Sign In —></button>
  </form>
</div>

<script>
function handleLogin(e) {
  e.preventDefault();
  
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errorBox = document.getElementById('errorBox');

  // Strict credentials validation (Dono 'yy' set hain)
  if (user === 'yy' && pass === 'yy') {
    errorBox.style.display = 'none';
    // Redirecting to your main parallel dashboard launcher
    window.location.href = '/launcher.html';
  } else {
    errorBox.style.display = 'block';
    document.getElementById('password').value = '';
  }
}
</script>

</body>
</html>
