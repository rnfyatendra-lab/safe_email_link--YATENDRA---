<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FastMailer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#f3f4f6;font-family:'Inter',sans-serif;color:#1f2937;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:32px;width:100%;max-width:400px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
.logo{text-align:center;font-size:24px;font-weight:700;color:#111827;margin-bottom:8px}
.logo span{color:#2563eb}
.subtitle{text-align:center;font-size:14px;color:#6b7280;margin-bottom:28px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:7px}
.field input{width:100%;padding:12px 15px;background:#f9fafb;border:2px solid #e5e7eb;border-radius:10px;color:#111827;font-family:'Inter',sans-serif;font-size:14px;outline:none}
.field input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 4px rgba(37,99,235,0.1)}
.login-btn{width:100%;padding:14px;background:#2563eb;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center}
.login-btn:hover{background:#1d4ed8}
.error-msg{display:none;background:#fef2f2;border:2px solid #f87171;color:#991b1b;padding:12px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:20px;text-align:center}
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">🛡️ Fast<span>Mailer Pro</span></div>
  <div class="subtitle">Secure Anti-Spam Email Console</div>

  <div class="error-msg" id="errorMsg">❌ Invalid Username or Password</div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="login-btn">Sign In</button>
  </form>
</div>

<script>
async function handleLogin(event) {
  event.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.style.display = 'none';

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      // लॉगिन सफल होने पर सीधे लॉन्चर डैशबोर्ड पर भेजें
      window.location.href = '/launcher';
    } else {
      errorMsg.textContent = `❌ ${data.message || 'Invalid Credentials'}`;
      errorMsg.style.display = 'block';
    }
  } catch (err) {
    errorMsg.textContent = '❌ Connection error. Is server running?';
    errorMsg.style.display = 'block';
  }
}
</script>

</body>
</html>
